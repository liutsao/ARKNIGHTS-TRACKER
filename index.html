<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRTS | 抽卡數據分析終端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --ak-bg: #121212;
            --ak-cyan: #00f0ff;
            --ak-yellow: #ffcf00;
            --ak-red: #ff4d4d;
            --ak-text: #e0e0e0;
            --ak-grid: rgba(0, 240, 255, 0.05);
        }

        body {
            background-color: var(--ak-bg);
            background-image: 
                linear-gradient(var(--ak-grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--ak-grid) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--ak-text);
            font-family: 'Noto Sans TC', sans-serif;
            min-height: 100vh;
        }

        .ak-btn {
            position: relative;
            background: #2b2b2b;
            color: #fff;
            padding: 8px 20px;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            transition: all 0.2s;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
        }

        .ak-btn:hover { background: var(--ak-cyan); color: #000; }
        .ak-btn.primary { background: var(--ak-cyan); color: #000; }
        .ak-btn.manual { background: #3f3f3f; color: var(--ak-yellow); border: 1px solid #555; }

        .ak-border-box {
            border-left: 4px solid var(--ak-cyan);
            background: rgba(30, 30, 30, 0.9);
            backdrop-filter: blur(10px);
        }

        @keyframes breathing {
            0%, 100% { box-shadow: 0 0 5px var(--ak-yellow); border-color: var(--ak-yellow); }
            50% { box-shadow: 0 0 20px var(--ak-yellow); border-color: #fff; }
        }

        .pu-star-6 {
            animation: breathing 2s infinite ease-in-out;
            border: 1px solid var(--ak-yellow) !important;
            color: var(--ak-yellow) !important;
        }

        .off-banner-6 {
            border: 1px solid rgba(255, 207, 0, 0.5) !important;
        }

        .star-6 { color: var(--ak-yellow); font-weight: bold; }
        .star-5 { color: #f9a8d4; }

        .modal-overlay {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
        }

        .loading-bar {
            height: 2px;
            background: var(--ak-cyan);
            transition: width 0.3s;
        }
        
        .error-msg {
            color: var(--ak-red);
            font-size: 11px;
            margin-top: 8px;
            background: rgba(255, 77, 77, 0.1);
            padding: 8px;
            border-left: 2px solid var(--ak-red);
        }

        input::placeholder { opacity: 0.3; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="mb-8 pb-4 border-b border-zinc-800 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div>
            <h1 class="text-3xl font-black italic tracking-tighter">PRTS <span class="text-sm not-italic font-normal opacity-50">ARCHIVE TERMINAL</span></h1>
            <p class="text-xs text-cyan-400" id="statusText">系統狀態: 待機中</p>
        </div>
        <div class="flex gap-2 flex-wrap">
            <input type="password" id="apiKey" placeholder="輸入 Gemini API Key" class="text-sm bg-zinc-900 border border-zinc-700 px-3 py-2 outline-none focus:border-cyan-500 text-white">
            <button onclick="openManualInputModal()" class="ak-btn manual text-xs"><i class="fas fa-keyboard"></i> 手動錄入</button>
            <button onclick="exportData()" class="ak-btn text-xs"><i class="fas fa-file-export"></i> 導出</button>
            <label class="ak-btn text-xs cursor-pointer">
                <i class="fas fa-file-import"></i> 導入
                <input type="file" id="importFile" class="hidden" onchange="importData(event)">
            </label>
            <button onclick="clearAllData()" class="ak-btn text-xs bg-red-900/20 text-red-400 hover:bg-red-500 hover:text-white"><i class="fas fa-trash"></i> 清空</button>
        </div>
    </header>

    <section id="globalStats" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
        <div class="ak-border-box p-4">
            <h3 class="text-xs opacity-50 mb-1 uppercase tracking-widest">平均出六星抽數 / / /</h3>
            <div id="avgPuPulls" class="text-4xl font-bold text-cyan-400">--</div>
        </div>
        <div class="ak-border-box p-4 border-l-red-500">
            <h3 class="text-xs opacity-50 mb-1 uppercase tracking-widest">非預期六星機率 / / /</h3>
            <div id="offBannerRate" class="text-4xl font-bold text-red-400">--</div>
        </div>
    </section>

    <section class="mb-10">
        <div class="border-2 border-dashed border-zinc-700 rounded p-4 text-center hover:border-cyan-500 transition-all bg-zinc-900/30">
            <input type="file" id="imageUpload" multiple accept="image/*" class="hidden" onchange="handleUpload(event)">
            <label for="imageUpload" class="cursor-pointer group">
                <i class="fas fa-terminal text-4xl mb-2 text-zinc-600 group-hover:text-cyan-500 transition-colors"></i>
                <p class="text-zinc-400 group-hover:text-zinc-200 text-sm">點擊上傳或拖放抽卡紀錄截圖</p>
                <p class="text-[10px] opacity-40 mt-1">建議單張上傳 | 自動辨識卡池與幹員</p>
            </label>
        </div>
        <div id="progressBarContainer" class="mt-4 hidden">
            <div class="w-full bg-zinc-800 h-0.5 mb-1">
                <div id="progressBar" class="loading-bar" style="width: 0%"></div>
            </div>
            <p id="progressLabel" class="text-[10px] text-cyan-500 uppercase">正在解析資料...</p>
            <div id="apiErrorLog" class="error-msg hidden"></div>
        </div>
    </section>

    <main id="poolContainer" class="space-y-6"></main>

    <!-- 設定 PU 幹員的視窗 -->
    <div id="puModal" class="modal-overlay fixed inset-0 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-zinc-900 p-6 w-full max-w-sm border border-cyan-900">
            <h3 class="text-lg font-bold mb-2 text-cyan-400 italic">SET UP RATE-UP UNIT</h3>
            <p class="text-[10px] mb-4 opacity-50">請輸入目標六星幹員，多位請用頓號(、)或空格區隔。</p>
            <input type="text" id="puInput" class="w-full mb-6 p-2 bg-black border border-zinc-700 focus:border-cyan-500 outline-none text-white">
            <div class="flex justify-end gap-3">
                <button onclick="closeModal('puModal')" class="text-xs opacity-50 uppercase">Cancel</button>
                <button onclick="savePU()" class="ak-btn primary text-xs">Confirm</button>
            </div>
        </div>
    </div>

    <!-- 手動錄入視窗 -->
    <div id="manualInputModal" class="modal-overlay fixed inset-0 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-zinc-900 p-6 w-full max-w-md border border-yellow-700">
            <h3 class="text-lg font-bold mb-2 text-yellow-500 italic">MANUAL DATA ENTRY</h3>
            <p class="text-[10px] mb-4 opacity-50">手動增加單筆抽取記錄至資料庫。</p>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-zinc-500 uppercase">卡池名稱</label>
                    <input type="text" id="manualPoolName" placeholder="例如：往日幻象" class="w-full p-2 bg-black border border-zinc-700 focus:border-yellow-500 outline-none text-white text-sm">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] text-zinc-500 uppercase">幹員名稱</label>
                        <input type="text" id="manualOpName" placeholder="例如：史爾特爾" class="w-full p-2 bg-black border border-zinc-700 focus:border-yellow-500 outline-none text-white text-sm">
                    </div>
                    <div>
                        <label class="text-[10px] text-zinc-500 uppercase">幹員星級</label>
                        <select id="manualOpStar" class="w-full p-2 bg-black border border-zinc-700 focus:border-yellow-500 outline-none text-white text-sm">
                            <option value="6">6 ★</option>
                            <option value="5">5 ★</option>
                            <option value="4">4 ★</option>
                            <option value="3">3 ★</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] text-zinc-500 uppercase">獲得時間</label>
                    <input type="text" id="manualOpTime" placeholder="YYYY-MM-DD HH:mm:ss" class="w-full p-2 bg-black border border-zinc-700 focus:border-yellow-500 outline-none text-white text-sm">
                </div>
            </div>

            <div class="flex justify-end gap-3 mt-8">
                <button onclick="closeModal('manualInputModal')" class="text-xs opacity-50 uppercase">Cancel</button>
                <button onclick="saveManualEntry()" class="ak-btn primary text-xs" style="background: var(--ak-yellow);">Add Record</button>
            </div>
        </div>
    </div>

    <!-- 編輯幹員視窗 -->
    <div id="editOpModal" class="modal-overlay fixed inset-0 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-zinc-900 p-6 w-full max-w-md border border-cyan-700">
            <h3 class="text-lg font-bold mb-2 text-cyan-500 italic">EDIT OPERATOR DATA</h3>
            <p class="text-[10px] mb-4 opacity-50">修正幹員資訊或從數據庫移除此記錄。</p>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-zinc-500 uppercase">幹員名稱</label>
                    <input type="text" id="editOpName" class="w-full p-2 bg-black border border-zinc-700 focus:border-cyan-500 outline-none text-white text-sm">
                </div>
                <div>
                    <label class="text-[10px] text-zinc-500 uppercase">幹員星級</label>
                    <select id="editOpStar" class="w-full p-2 bg-black border border-zinc-700 focus:border-cyan-500 outline-none text-white text-sm">
                        <option value="6">6 ★</option>
                        <option value="5">5 ★</option>
                        <option value="4">4 ★</option>
                        <option value="3">3 ★</option>
                    </select>
                </div>
            </div>

            <div class="flex justify-between mt-8">
                <button onclick="deleteOperator()" class="text-xs text-red-500 hover:text-red-400 uppercase font-bold">
                    <i class="fas fa-trash-alt mr-1"></i> Delete
                </button>
                <div class="flex gap-3">
                    <button onclick="closeModal('editOpModal')" class="text-xs opacity-50 uppercase">Cancel</button>
                    <button onclick="saveEditOperator()" class="ak-btn primary text-xs">Update</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db = { pools: {} };
        const DB_KEY = 'arknights_tracker_v2';
        const API_KEY_KEY = 'arknights_gemini_key';

        // 用於追蹤當前編輯狀態的全域變數
        let currentEditPool = "";
        let currentEditIdx = -1;

        window.onload = () => {
            const savedKey = localStorage.getItem(API_KEY_KEY);
            if (savedKey) document.getElementById('apiKey').value = savedKey;

            const savedDb = localStorage.getItem(DB_KEY);
            if (savedDb) {
                try {
                    db = JSON.parse(savedDb);
                    renderAll();
                } catch(e) { db = { pools: {} }; }
            }
        };

        // 開啟手動錄入 Modal
        function openManualInputModal() {
            const now = new Date();
            const formattedTime = now.getFullYear() + "-" + 
                String(now.getMonth() + 1).padStart(2, '0') + "-" + 
                String(now.getDate()).padStart(2, '0') + " " + 
                String(now.getHours()).padStart(2, '0') + ":" + 
                String(now.getMinutes()).padStart(2, '0') + ":" + 
                String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('manualOpTime').value = formattedTime;
            document.getElementById('manualInputModal').classList.remove('hidden');
        }

        // 儲存手動錄入
        function saveManualEntry() {
            const poolName = document.getElementById('manualPoolName').value.trim();
            const opName = document.getElementById('manualOpName').value.trim();
            const opStar = parseInt(document.getElementById('manualOpStar').value);
            const opTime = document.getElementById('manualOpTime').value.trim();

            if (!poolName || !opName || !opTime) {
                alert("請填寫完整資訊。");
                return;
            }

            const newOp = { name: opName, star: opStar, time: opTime };
            processResult({ poolName: poolName, operators: [newOp] });
            
            saveAndRender();
            closeModal('manualInputModal');
            
            // 清空輸入框以便下次使用
            document.getElementById('manualOpName').value = "";
        }

        async function handleUpload(event) {
            const files = Array.from(event.target.files);
            const apiKey = document.getElementById('apiKey').value.trim();
            
            if (!apiKey) {
                alert("請輸入有效的 Gemini API Key。");
                return;
            }
            localStorage.setItem(API_KEY_KEY, apiKey);

            const progressContainer = document.getElementById('progressBarContainer');
            const progressBar = document.getElementById('progressBar');
            const progressLabel = document.getElementById('progressLabel');
            const statusText = document.getElementById('statusText');
            const errorLog = document.getElementById('apiErrorLog');

            errorLog.innerText = "";
            errorLog.classList.add('hidden');
            progressContainer.classList.remove('hidden');
            statusText.innerText = "系統狀態: 正在連接 PRTS 數據庫...";

            for (let i = 0; i < files.length; i++) {
                const percent = ((i / files.length) * 100).toFixed(0);
                progressBar.style.width = `${percent}%`;
                progressLabel.innerText = `正在處理檔案 (${i+1}/${files.length})...`;

                try {
                    const base64 = await fileToBase64(files[i]);
                    const result = await recognizeImage(base64, apiKey);
                    if (result) {
                        processResult(result);
                    }
                } catch (e) {
                    console.error("解析失敗:", e);
                    errorLog.innerText = `PRTS 終端錯誤: ${e.message}`;
                    errorLog.classList.remove('hidden');
                    break; 
                }
            }

            progressBar.style.width = `100%`;
            setTimeout(() => {
                if (errorLog.classList.contains('hidden')) progressContainer.classList.add('hidden');
            }, 3000);
            statusText.innerText = "系統狀態: 數據同步完成";
            saveAndRender();
        }

        async function recognizeImage(base64Data, apiKey) {
            const prompt = `
                你是一位專業的明日方舟數據分析員。
                請辨識這張截圖中的：
                1. 卡池名稱 (如: 往日幻象)
                2. 獲得的所有幹員名稱、星級(3, 4, 5, 6)、獲得時間(格式: YYYY-MM-DD HH:mm:ss)。
                
                請嚴格輸出 JSON 格式，不要包含其他解釋字串：
                {
                  "poolName": "卡池名稱",
                  "operators": [
                    {"name": "幹員名稱", "star": 6, "time": "2024-03-20 14:00:00"}
                  ]
                }
            `;

            const model = "gemini-2.5-flash";
            const url = `https://generativelanguage.googleapis.com/v1/models/${model}:generateContent?key=${apiKey}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: prompt },
                                { inlineData: { mimeType: "image/png", data: base64Data.split(',')[1] } }
                            ]
                        }]
                    })
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error?.message || `HTTP ${response.status}`);
                }

                const data = await response.json();
                
                if (!data.candidates || data.candidates.length === 0) {
                    throw new Error("API 未回傳有效候選結果。");
                }

                const rawText = data.candidates[0].content.parts[0].text;
                const jsonMatch = rawText.match(/\{[\s\S]*\}/);
                if (!jsonMatch) throw new Error("辨識結果無法轉化為數據格式。");
                
                return JSON.parse(jsonMatch[0]);
            } catch (err) {
                throw err;
            }
        }

        function processResult(data) {
            if (!data || !data.poolName || !data.operators) return;

            if (!db.pools[data.poolName]) {
                db.pools[data.poolName] = { puName: "", records: [] };
            }

            data.operators.forEach(op => {
                // 直接推入數據，不再檢查是否重複
                db.pools[data.poolName].records.push(op);
            });

            db.pools[data.poolName].records.sort((a, b) => new Date(a.time) - new Date(b.time));
        }

        function saveAndRender() {
            localStorage.setItem(DB_KEY, JSON.stringify(db));
            renderAll();
        }

        // 檢查某個幹員是否在 PU 名單中
        function isOperatorPU(opName, puString) {
            if (!puString) return false;
            // 將輸入的字串依照逗號、全形頓號或空格切開，並去除多餘空白
            const puList = puString.split(/[,、\s]+/).filter(name => name.trim() !== "");
            return puList.includes(opName);
        }

        function renderAll() {
            renderStats();
            renderPools();
        }

        function renderStats() {
            let totalPuPulls = 0;
            let puCount = 0;
            let total6Stars = 0;
            let totalOffBanner = 0;

            Object.values(db.pools).forEach(pool => {
                if (!pool.puName) return;
                let pullCounter = 0;
                pool.records.forEach(op => {
                    pullCounter++;
                    if (op.star === 6) {
                        total6Stars++;
                        if (isOperatorPU(op.name, pool.puName)) {
                            totalPuPulls += pullCounter;
                            puCount++;
                            pullCounter = 0;
                        } else {
                            totalOffBanner++;
                        }
                    }
                });
            });

            const avgPullsEl = document.getElementById('avgPuPulls');
            const offRateEl = document.getElementById('offBannerRate');

            avgPullsEl.innerHTML = puCount > 0 ? `${(totalPuPulls / puCount).toFixed(1)}<span class="text-lg ml-1">抽</span>` : "--";
            offRateEl.innerHTML = total6Stars > 0 ? `${((totalOffBanner / total6Stars) * 100).toFixed(1)}<span class="text-lg ml-1">%</span>` : "--<span class=\"text-lg ml-1\">%</span>";
        }

        function renderPools() {
            const container = document.getElementById('poolContainer');
            container.innerHTML = '';

            const sortedPoolNames = Object.keys(db.pools).sort((a, b) => {
                const timeA = db.pools[a].records.length ? new Date(db.pools[a].records[db.pools[a].records.length-1].time) : 0;
                const timeB = db.pools[b].records.length ? new Date(db.pools[b].records[db.pools[b].records.length-1].time) : 0;
                return timeB - timeA;
            });

            sortedPoolNames.forEach(poolName => {
                const pool = db.pools[poolName];
                const poolDiv = document.createElement('div');
                poolDiv.className = 'ak-border-box overflow-hidden mb-6';

                let pullSummaries = [];
                let currentCount = 0;
                pool.records.forEach(op => {
                    currentCount++;
                    if (op.star === 6) {
                        pullSummaries.push({ name: op.name, pulls: currentCount, isPu: isOperatorPU(op.name, pool.puName) });
                        currentCount = 0; // 重置計數
                    }
                });

                poolDiv.innerHTML = `
                    <div class="p-4 bg-zinc-800/80 flex justify-between items-center border-b border-zinc-700">
                        <div class="cursor-pointer" onclick="openPuModal('${poolName.replace(/'/g, "\\'")}')">
                            <div class="flex items-center gap-2 flex-wrap">
                                <h2 class="text-lg font-bold text-white tracking-tight">${poolName}</h2>
                                ${pool.puName ? pool.puName.split(/[,、\s]+/).filter(n => n.trim()).map(name => `
                                    <span class="text-[10px] bg-white text-black px-2 font-bold whitespace-nowrap">PU: ${name}</span>
                                `).join('') : ''}
                            </div>
                            <span class="text-[10px] text-cyan-500 bg-cyan-950 px-2 py-0.5 font-mono">COUNT: ${pool.records.length}</span>
                        </div>
                        <button onclick="deletePool('${poolName.replace(/'/g, "\\'")}')" class="text-zinc-500 hover:text-red-500 p-2"><i class="fas fa-times"></i></button>
                    </div>
                    <div class="p-4">
                        ${pool.puName ? `
                            <div class="mb-4 flex flex-wrap gap-2">
                                ${pullSummaries.map(s => `
                                    <span class="text-[10px] px-2 py-1 border border-zinc-700 ${s.isPu ? 'pu-star-6 font-bold' : 'off-banner-6 text-zinc-400 bg-zinc-800/40'}">
                                        ${s.name} [${s.pulls}]
                                    </span>
                                `).join('')}
                            </div>
                        ` : `<p class="text-[10px] opacity-30 italic mb-4 tracking-wider underline underline-offset-4 decoration-cyan-900 cursor-pointer" onclick="openPuModal('${poolName.replace(/'/g, "\\'")}')">點擊卡池標題以設定目標 PU 六星角色</p>`}
                        
                        <div class="grid grid-cols-3 sm:grid-cols-5 md:grid-cols-8 lg:grid-cols-10 gap-2">
                            ${pool.records.map((op, idx) => `
                                <div class="p-2 bg-zinc-900 border border-zinc-800 text-center cursor-pointer hover:border-cyan-500 transition-all 
                                    ${isOperatorPU(op.name, pool.puName) ? 'pu-star-6' : (op.star === 6 ? 'off-banner-6' : '')}" 
                                     onclick="editOperator('${poolName.replace(/'/g, "\\'")}', ${idx})">
                                    <div class="text-[10px] font-bold truncate">${op.name}</div>
                                    <div class="text-[9px] ${op.star === 6 ? 'star-6' : op.star === 5 ? 'star-5' : 'opacity-30'}">${'★'.repeat(op.star)}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                container.appendChild(poolDiv);
            });
        }

        // 修改編輯函式，顯示自定義 Modal
        function editOperator(poolName, recordIndex) {
            currentEditPool = poolName;
            currentEditIdx = recordIndex;
            const op = db.pools[poolName].records[recordIndex];

            // 填充資料
            document.getElementById('editOpName').value = op.name;
            document.getElementById('editOpStar').value = op.star;

            // 顯示 Modal
            document.getElementById('editOpModal').classList.remove('hidden');
        }

        // 儲存修改
        function saveEditOperator() {
            const newName = document.getElementById('editOpName').value.trim();
            const newStar = parseInt(document.getElementById('editOpStar').value);

            if (!newName) return alert("名稱不能為空");

            db.pools[currentEditPool].records[currentEditIdx].name = newName;
            db.pools[currentEditPool].records[currentEditIdx].star = newStar;

            closeModal('editOpModal');
            saveAndRender();
        }

        // 刪除幹員記錄
        function deleteOperator() {
            if (confirm("確定要刪除這筆抽取記錄嗎？此操作無法復原。")) {
                db.pools[currentEditPool].records.splice(currentEditIdx, 1);
                closeModal('editOpModal');
                saveAndRender();
            }
        }

        let currentEditingPool = "";
        function openPuModal(name) {
            currentEditingPool = name;
            document.getElementById('puInput').value = db.pools[name].puName;
            document.getElementById('puModal').classList.remove('hidden');
        }
        function closeModal(modalId) { 
            document.getElementById(modalId).classList.add('hidden'); 
        }
        function savePU() {
            db.pools[currentEditingPool].puName = document.getElementById('puInput').value.trim();
            closeModal('puModal');
            saveAndRender();
        }
        function deletePool(name) {
            if (confirm(`確認移除卡池記錄: ${name}？`)) {
                delete db.pools[name];
                saveAndRender();
            }
        }
        function clearAllData() {
            if (confirm("警告：即將清空所有本地抽卡紀錄。")) {
                db = { pools: {} };
                saveAndRender();
            }
        }
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }
        function exportData() {
            const blob = new Blob([JSON.stringify(db)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `arknights_prts_log.json`;
            a.click();
        }
        function importData(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    db = JSON.parse(event.target.result);
                    saveAndRender();
                } catch(e) { alert("無效的備份檔案。"); }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
