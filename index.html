<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRTS | 明日方舟抽卡紀錄終端</title>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ak-yellow: #ffcf00;
            --ak-orange: #ff7b00;
            --ak-bg: #0d0d0d;
            --ak-card: #161616;
        }
        body {
            font-family: 'Noto Sans TC', 'JetBrains Mono', sans-serif;
            background-color: var(--ak-bg);
            color: #e0e0e0;
            margin: 0;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass-card {
            background: var(--ak-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .ak-border { border-left: 4px solid var(--ak-yellow); }
        .pity-count { color: #52ff7e; font-weight: bold; }
        .six-star-row { background: rgba(255, 123, 0, 0.1); }
        .six-star-text { color: var(--ak-orange); font-weight: bold; text-shadow: 0 0 10px rgba(255,123,0,0.3); }
        
        /* 動畫 */
        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        .scanning::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent, var(--ak-yellow), transparent);
            opacity: 0.1;
            height: 20%;
            width: 100%;
            animation: scan 2s linear infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            // 狀態管理
            const [apiKey, setApiKey] = useState(localStorage.getItem('ak_api_key') || '');
            const [logs, setLogs] = useState([]); // 格式: [{pool, operator, rarity, time}]
            const [poolSettings, setPoolSettings] = useState({}); // 格式: {poolName: {puChar: '角色名'}}
            const [isScanning, setIsScanning] = useState(false);
            const [showApiModal, setShowApiModal] = useState(false);
            const [editingPool, setEditingPool] = useState(null);

            // 初始化數據
            useEffect(() => {
                const savedData = localStorage.getItem('prts_db_v2');
                if (savedData) {
                    const parsed = JSON.parse(savedData);
                    if (parsed.logs) setLogs(parsed.logs);
                    if (parsed.settings) setPoolSettings(parsed.settings);
                }
            }, []);

            // 持久化儲存
            useEffect(() => {
                localStorage.setItem('prts_db_v2', JSON.stringify({ logs, settings: poolSettings }));
            }, [logs, poolSettings]);

            // --- 核心邏輯：數據處理 ---
            const processedData = useMemo(() => {
                // 1. 先按時間排序（確保抽數計算正確）
                const sortedLogs = [...logs].sort((a, b) => new Date(a.time) - new Date(b.time));
                
                // 2. 按卡池分組
                const groups = {};
                sortedLogs.forEach(log => {
                    if (!groups[log.pool]) groups[log.pool] = [];
                    groups[log.pool].push(log);
                });

                // 3. 計算每個池子的詳細抽數
                const poolAnalysis = Object.keys(groups).map(poolName => {
                    const poolLogs = groups[poolName];
                    const puTarget = poolSettings[poolName]?.puChar || "";
                    
                    let currentPity = 0;
                    const sixStarEvents = [];
                    let foundPU = false;
                    let pullsToFirstPU = 0;

                    poolLogs.forEach(log => {
                        currentPity++;
                        if (log.rarity === 6) {
                            const isPU = puTarget && log.operator.includes(puTarget);
                            sixStarEvents.push({
                                ...log,
                                pity: currentPity,
                                isPU: isPU
                            });
                            
                            if (isPU && !foundPU) {
                                foundPU = true;
                                pullsToFirstPU = currentPity; // 這裡可以根據需求改為累加
                            }
                            currentPity = 0; // 遇到六星重置保底計數
                        }
                    });

                    return {
                        name: poolName,
                        totalPulls: poolLogs.length,
                        sixStars: sixStarEvents,
                        puTarget: puTarget,
                        pityToTarget: sixStarEvents.filter(s => s.isPU).reduce((acc, curr) => acc + curr.pity, 0) // 此池為了抽到PU總共花的抽數
                    };
                });

                // 4. 計算全局統計
                let totalPuPity = 0;
                let puCount = 0;
                let totalSixCount = 0;
                let offBannerCount = 0;

                poolAnalysis.forEach(p => {
                    p.sixStars.forEach(s => {
                        totalSixCount++;
                        if (p.puTarget) {
                            if (s.isPU) {
                                totalPuPity += s.pity;
                                puCount++;
                            } else {
                                offBannerCount++;
                            }
                        }
                    });
                });

                return {
                    pools: poolAnalysis,
                    avgPuPulls: puCount > 0 ? (totalPuPity / puCount).toFixed(1) : "---",
                    offRate: totalSixCount > 0 ? ((offBannerCount / totalSixCount) * 100).toFixed(1) : "0"
                };
            }, [logs, poolSettings]);

            // --- AI 辨識 ---
            const analyzeImages = async (e) => {
                if (!apiKey) { setShowApiModal(true); return; }
                const files = Array.from(e.target.files);
                setIsScanning(true);

                const newLogs = [...logs];

                for (const file of files) {
                    try {
                        const base64 = await new Promise(r => {
                            const reader = new FileReader();
                            reader.onload = () => r(reader.result.split(',')[1]);
                            reader.readAsDataURL(file);
                        });

                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{
                                    parts: [
                                        { text: "請解析圖中所有抽卡紀錄。每一列是一個紀錄。" },
                                        { inlineData: { mimeType: "image/jpeg", data: base64 } }
                                    ]
                                }],
                                systemInstruction: {
                                    parts: [{ text: "你是一個資料提取專家。請從明日方舟歷史紀錄中提取 JSON。格式：{\"pulls\": [{\"pool\": \"池名\", \"operator\": \"名稱\", \"rarity\": 數字3到6, \"time\": \"YYYY-MM-DD HH:MM:SS\"}]}" }]
                                },
                                generationConfig: { responseMimeType: "application/json" }
                            })
                        });

                        const data = await response.json();
                        const result = JSON.parse(data.candidates[0].content.parts[0].text);

                        if (result.pulls) {
                            result.pulls.forEach(p => {
                                // 根據時間和名稱去重
                                if (!newLogs.find(x => x.time === p.time && x.operator === p.operator)) {
                                    newLogs.push(p);
                                }
                            });
                        }
                    } catch (err) {
                        console.error("解析失敗:", err);
                    }
                }

                setLogs(newLogs);
                setIsScanning(false);
            };

            // --- 導入/導出 ---
            const handleImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        if (data.logs) setLogs(data.logs);
                        if (data.settings) setPoolSettings(data.settings);
                        alert("數據匯入成功");
                    } catch (err) { alert("無效的檔案格式"); }
                };
                reader.readAsText(file);
            };

            const handleExport = () => {
                const data = JSON.stringify({ logs, settings: poolSettings });
                const blob = new Blob([data], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `PRTS_Backup_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
            };

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-10">
                    {/* Header */}
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
                        <div>
                            <h1 className="text-4xl font-bold tracking-tighter flex items-center gap-3">
                                <span className="bg-white text-black px-2 py-0.5 text-xl">PRTS</span>
                                抽卡數據終端
                            </h1>
                            <p className="text-zinc-500 text-sm mt-2 mono">LOCAL_STORAGE_MODE // VERSION 2.0.4</p>
                        </div>
                        <div className="flex flex-wrap gap-3">
                            <button onClick={() => setShowApiModal(true)} className="px-4 py-2 border border-zinc-700 hover:bg-zinc-800 transition text-xs mono">SET_API_KEY</button>
                            <button onClick={handleExport} className="px-4 py-2 border border-zinc-700 hover:bg-zinc-800 transition text-xs mono">EXPORT_JSON</button>
                            <label className="px-4 py-2 border border-zinc-700 hover:bg-zinc-800 transition text-xs mono cursor-pointer">
                                IMPORT_JSON
                                <input type="file" className="hidden" onChange={handleImport} accept=".json" />
                            </label>
                        </div>
                    </div>

                    {/* Global Dashboard */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
                        <div className="glass-card p-8 ak-border">
                            <h3 className="text-zinc-500 text-xs mb-2 mono">AVG_PULLS_FOR_PU_SIX_STAR</h3>
                            <div className="text-5xl font-bold mono italic">
                                {processedData.avgPuPulls} <span className="text-lg font-normal not-italic text-zinc-600">PULLS</span>
                            </div>
                            <p className="text-[10px] text-zinc-600 mt-4 uppercase">基於所有已設定 PU 角色之卡池計算</p>
                        </div>
                        <div className="glass-card p-8 border-l-4 border-red-500">
                            <h3 className="text-zinc-500 text-xs mb-2 mono">OFF_BANNER_SIX_STAR_RATE</h3>
                            <div className="text-5xl font-bold mono italic">
                                {processedData.offRate}<span className="text-2xl">%</span>
                            </div>
                            <p className="text-[10px] text-zinc-600 mt-4 uppercase">排除 PU 角色後歪到其他六星的機率</p>
                        </div>
                    </div>

                    {/* Upload Area */}
                    <div className={`relative mb-16 overflow-hidden glass-card rounded-xl p-12 text-center transition-all ${isScanning ? 'scanning cursor-wait' : 'hover:border-zinc-500 cursor-pointer'}`}>
                        <input type="file" multiple className="absolute inset-0 opacity-0 cursor-pointer" onChange={analyzeImages} disabled={isScanning} accept="image/*" />
                        <div className="relative z-10">
                            <div className="text-4xl mb-4">📂</div>
                            <h2 className="text-xl font-bold mb-2 uppercase tracking-widest">
                                {isScanning ? "PRTS 解析中..." : "上傳歷史紀錄截圖"}
                            </h2>
                            <p className="text-zinc-500 text-xs mono uppercase">Supports multiple images. AI will handle data extraction.</p>
                        </div>
                    </div>

                    {/* Pool List */}
                    <div className="space-y-10">
                        {processedData.pools.slice().reverse().map(pool => (
                            <div key={pool.name} className="glass-card rounded-lg overflow-hidden">
                                <div 
                                    className="p-6 bg-zinc-900/50 border-b border-zinc-800 flex justify-between items-center cursor-pointer hover:bg-zinc-800/50 transition"
                                    onClick={() => setEditingPool(pool.name)}
                                >
                                    <div>
                                        <div className="flex items-center gap-3">
                                            <h2 className="text-xl font-bold">{pool.name}</h2>
                                            <span className="bg-zinc-800 text-zinc-400 text-[10px] px-2 py-0.5 rounded">共 {pool.totalPulls} 抽</span>
                                        </div>
                                        <p className="text-xs text-zinc-500 mt-2">
                                            {pool.puTarget ? (
                                                <span className="text-yellow-500 font-bold">🎯 PU 目標: {pool.puTarget}</span>
                                            ) : (
                                                "尚未設定 PU 角色 (點擊此處設定)"
                                            )}
                                        </p>
                                    </div>
                                    <div className="text-right">
                                        <div className="text-xs text-zinc-600 mono mb-1 uppercase">Pulls for PU</div>
                                        <div className="text-2xl font-bold mono">{pool.pityToTarget || "---"}</div>
                                    </div>
                                </div>
                                
                                <div className="p-0">
                                    <table className="w-full text-left">
                                        <thead className="text-[10px] text-zinc-500 mono uppercase border-b border-zinc-800 bg-black/20">
                                            <tr>
                                                <th className="px-6 py-3">Operator</th>
                                                <th className="px-6 py-3 text-right">Pity Cost</th>
                                                <th className="px-6 py-3 text-right">Acquisition Time</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-zinc-800/50">
                                            {pool.sixStars.map((s, i) => (
                                                <tr key={i} className={`hover:bg-white/5 transition-colors ${s.isPU ? 'six-star-row' : ''}`}>
                                                    <td className="px-6 py-4">
                                                        <span className={s.rarity === 6 ? 'six-star-text' : ''}>
                                                            {s.operator} {s.isPU && "✨"}
                                                        </span>
                                                    </td>
                                                    <td className="px-6 py-4 text-right mono pity-count">{s.pity}</td>
                                                    <td className="px-6 py-4 text-right text-xs text-zinc-600 mono">{s.time}</td>
                                                </tr>
                                            ))}
                                            {pool.sixStars.length === 0 && (
                                                <tr>
                                                    <td colSpan="3" className="px-6 py-8 text-center text-zinc-700 text-sm italic">
                                                        該卡池未錄得六星出貨紀錄
                                                    </td>
                                                </tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* API Modal */}
                    {showApiModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/90 p-6">
                            <div className="glass-card max-w-md w-full p-8 rounded-xl border-t-4 border-yellow-500">
                                <h3 className="text-xl font-bold mb-4">Gemini API 設定</h3>
                                <p className="text-sm text-zinc-400 mb-6 leading-relaxed">
                                    此工具使用 Gemini 1.5 Flash 進行影像辨識。請輸入您的 API 金鑰（金鑰僅會儲存在您的瀏覽器中）。
                                </p>
                                <input 
                                    type="password" 
                                    autoFocus
                                    className="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-lg mb-6 outline-none focus:border-yellow-500 text-sm mono"
                                    value={apiKey}
                                    onChange={(e) => {
                                        setApiKey(e.target.value);
                                        localStorage.setItem('ak_api_key', e.target.value);
                                    }}
                                    placeholder="Enter Gemini API Key..."
                                />
                                <button onClick={() => setShowApiModal(false)} className="w-full py-4 bg-yellow-500 text-black font-bold rounded-lg hover:bg-yellow-400 transition uppercase tracking-widest text-sm">確認同步</button>
                            </div>
                        </div>
                    )}

                    {/* Setting PU Modal */}
                    {editingPool && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/90 p-6">
                            <div className="glass-card max-w-md w-full p-8 rounded-xl">
                                <h3 className="text-xl font-bold mb-2">卡池設定</h3>
                                <p className="text-xs text-zinc-500 mb-6 mono uppercase">{editingPool}</p>
                                
                                <label className="block text-xs text-zinc-400 mb-2 uppercase mono">Target PU Character</label>
                                <input 
                                    type="text" 
                                    autoFocus
                                    className="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-lg mb-8 outline-none focus:border-yellow-500"
                                    value={poolSettings[editingPool]?.puChar || ''}
                                    onChange={(e) => setPoolSettings({
                                        ...poolSettings,
                                        [editingPool]: { ...poolSettings[editingPool], puChar: e.target.value }
                                    })}
                                    placeholder="輸入該池 PU 六星名稱 (例: 維什戴爾)"
                                />
                                
                                <div className="flex gap-4">
                                    <button 
                                        onClick={() => {
                                            setLogs(logs.filter(l => l.pool !== editingPool));
                                            setEditingPool(null);
                                        }}
                                        className="flex-1 py-3 text-red-500 text-xs border border-red-500/20 hover:bg-red-500/10 transition rounded-lg"
                                    >
                                        刪除此池紀錄
                                    </button>
                                    <button onClick={() => setEditingPool(null)} className="flex-1 py-3 bg-white text-black font-bold rounded-lg hover:bg-zinc-200 transition text-sm">儲存</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="mt-20 py-10 border-t border-zinc-900 text-center text-zinc-700 text-xs mono uppercase tracking-widest">
                        PRTS Terminal // Rhodes Island Pull Management System
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
