<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRTS - 明日方舟抽卡分析終端</title>
    
    <!-- 核心依賴：確保 Babel 在最前面載入 -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+TC:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ak-yellow: #ffcf00;
            --ak-orange: #ff7b00;
            --ak-bg: #0a0a0a;
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--ak-bg);
            color: #d1d1d1;
            margin: 0;
            overflow-x: hidden;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* 背景裝飾 */
        .bg-grid {
            background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 30px 30px;
            position: fixed;
            inset: 0;
            z-index: -1;
        }

        .glass-card {
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .status-bar {
            background: linear-gradient(90deg, var(--ak-yellow), var(--ak-orange));
            height: 2px;
            width: 100%;
        }

        /* 明日方舟風格按鈕 */
        .ak-btn {
            position: relative;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            transition: all 0.2s;
        }
        .ak-btn:active { transform: scale(0.95); }

        /* 六星閃爍動畫 */
        @keyframes shine {
            0% { text-shadow: 0 0 5px var(--ak-orange); }
            50% { text-shadow: 0 0 20px var(--ak-orange), 0 0 30px var(--ak-yellow); }
            100% { text-shadow: 0 0 5px var(--ak-orange); }
        }
        .six-star-active {
            color: var(--ak-orange);
            font-weight: bold;
            animation: shine 2s infinite;
        }
    </style>
</head>
<body>
    <div id="root">
        <!-- 初始讀取畫面，防止白屏 -->
        <div id="loader" style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <div style="width: 50px; height: 50px; border: 3px solid #333; border-top-color: #ffcf00; border-radius: 50%; animation: spin 1s linear infinite;"></div>
            <p style="margin-top: 20px; color: #666; font-family: sans-serif; letter-spacing: 2px;">PRTS SYSTEM INITIALIZING...</p>
        </div>
    </div>

    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>

    <script type="text/babel">
        // 確保在 React 載入後隱藏 loader
        document.getElementById('loader')?.remove();

        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [apiKey, setApiKey] = useState(localStorage.getItem('ak_gemini_key') || '');
            const [logs, setLogs] = useState([]);
            const [poolSettings, setPoolSettings] = useState({});
            const [loading, setLoading] = useState(false);
            const [showApiModal, setShowApiModal] = useState(false);
            const [editingPool, setEditingPool] = useState(null);

            const appId = typeof __app_id !== 'undefined' ? __app_id : 'arknights-pity-tracker';

            // 讀取本地數據
            useEffect(() => {
                try {
                    const saved = localStorage.getItem(`${appId}_data`);
                    if (saved) {
                        const { logs: l, settings: s } = JSON.parse(saved);
                        setLogs(l || []);
                        setPoolSettings(s || {});
                    }
                } catch (e) { console.error("Data load error", e); }
            }, []);

            // 儲存本地數據
            useEffect(() => {
                localStorage.setItem(`${appId}_data`, JSON.stringify({ logs, settings: poolSettings }));
            }, [logs, poolSettings]);

            // Gemini API 調用 (具備 Exponential Backoff)
            const callOCR = async (base64) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                const prompt = `你是一位 PRTS 解析專家。請從明日方舟歷史記錄截圖中提取 JSON。
                格式：{"pulls": [{"pool": "池名", "operator": "名稱", "rarity": 6, "time": "2025-12-29 19:45:19"}]}
                注意：
                1. 橙色/黃色文字 = 6星。
                2. 必須嚴格遵守 JSON 格式。`;

                const payload = {
                    contents: [{
                        parts: [
                            { text: "請解析圖中的抽卡資料。" },
                            { inlineData: { mimeType: "image/jpeg", data: base64 } }
                        ]
                    }],
                    systemInstruction: { parts: [{ text: prompt }] },
                    generationConfig: { responseMimeType: "application/json" }
                };

                for (let i = 0; i < 5; i++) {
                    try {
                        const res = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
                        if (!res.ok) throw new Error("API Error");
                        const data = await res.json();
                        return JSON.parse(data.candidates[0].content.parts[0].text);
                    } catch (e) {
                        if (i === 4) throw e;
                        await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                    }
                }
            };

            const handleFileUpload = async (e) => {
                if (!apiKey) {
                    setShowApiModal(true);
                    return;
                }
                const files = Array.from(e.target.files);
                setLoading(true);

                let newEntries = [...logs];

                for (const file of files) {
                    try {
                        const base64 = await new Promise((resolve) => {
                            const reader = new FileReader();
                            reader.onload = () => resolve(reader.result.split(',')[1]);
                            reader.readAsDataURL(file);
                        });
                        const result = await callOCR(base64);
                        if (result.pulls) {
                            result.pulls.forEach(p => {
                                // 檢查重複
                                if (!newEntries.some(e => e.time === p.time && e.operator === p.operator)) {
                                    newEntries.push(p);
                                }
                            });
                        }
                    } catch (err) {
                        console.error("OCR Failed", err);
                    }
                }

                setLogs(newEntries.sort((a, b) => new Date(a.time) - new Date(b.time)));
                setLoading(false);
            };

            // 數據分析
            const stats = useMemo(() => {
                const groups = {};
                logs.forEach(l => {
                    if (!groups[l.pool]) groups[l.pool] = [];
                    groups[l.pool].push(l);
                });

                let totalPuPity = 0;
                let puCount = 0;
                let totalSix = 0;
                let offSix = 0;

                const processedPools = Object.keys(groups).map(name => {
                    const poolLogs = groups[name];
                    const pu = poolSettings[name]?.puChar;
                    let pityCounter = 0;
                    const sixPulls = [];

                    poolLogs.forEach(log => {
                        pityCounter++;
                        if (log.rarity === 6) {
                            totalSix++;
                            const isPU = pu && log.operator.includes(pu);
                            if (isPU) {
                                totalPuPity += pityCounter;
                                puCount++;
                            } else {
                                offSix++;
                            }
                            sixPulls.push({ ...log, pity: pityCounter, isPU });
                            pityCounter = 0;
                        }
                    });

                    return { name, total: poolLogs.length, sixPulls, pu };
                });

                return {
                    pools: processedPools,
                    avgPity: puCount ? (totalPuPity / puCount).toFixed(1) : "---",
                    offRate: totalSix ? ((offSix / totalSix) * 100).toFixed(1) : "0"
                };
            }, [logs, poolSettings]);

            const exportData = () => {
                const blob = new Blob([JSON.stringify({ logs, poolSettings })], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `arknights_prts_backup.json`;
                a.click();
            };

            return (
                <div className="min-h-screen pb-20">
                    <div className="bg-grid"></div>
                    
                    {/* Top Header */}
                    <div className="border-b border-zinc-800 sticky top-0 z-40 bg-black/80 backdrop-blur-md">
                        <div className="max-w-6xl mx-auto px-6 py-4 flex flex-wrap justify-between items-center gap-4">
                            <div>
                                <h1 className="text-2xl font-bold tracking-widest flex items-center gap-3">
                                    <span className="bg-white text-black px-2 py-1 text-xs">PRTS</span>
                                    明日方舟分析終端
                                </h1>
                            </div>
                            <div className="flex gap-4">
                                <button onClick={() => setShowApiModal(true)} className="text-xs border border-zinc-700 px-3 py-1 hover:bg-white hover:text-black transition">API CONFIG</button>
                                <button onClick={exportData} className="text-xs border border-zinc-700 px-3 py-1 hover:bg-white hover:text-black transition">EXPORT DATA</button>
                            </div>
                        </div>
                        <div className="status-bar"></div>
                    </div>

                    <main className="max-w-6xl mx-auto px-6 mt-10">
                        {/* Global Stats Area */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                            <div className="glass-card p-6 rounded-sm border-l-4 border-yellow-500">
                                <div className="text-[10px] text-zinc-500 mb-2 mono">AVG_PULLS_FOR_TARGET</div>
                                <div className="text-4xl font-bold mono">{stats.avgPity} <span className="text-sm font-normal opacity-40">PULLS</span></div>
                            </div>
                            <div className="glass-card p-6 rounded-sm border-l-4 border-red-500">
                                <div className="text-[10px] text-zinc-500 mb-2 mono">OFF_BANNER_RATE</div>
                                <div className="text-4xl font-bold mono">{stats.offRate}%</div>
                            </div>
                            <div className="glass-card p-6 rounded-sm border-l-4 border-zinc-500">
                                <div className="text-[10px] text-zinc-500 mb-2 mono">TOTAL_RECORDS</div>
                                <div className="text-4xl font-bold mono">{logs.length} <span className="text-sm font-normal opacity-40">ITEMS</span></div>
                            </div>
                        </div>

                        {/* Upload Zone */}
                        <div className="mb-16">
                            <label className={`block border-2 border-dashed rounded-lg p-12 text-center transition-all cursor-pointer ${loading ? 'border-yellow-500 bg-yellow-500/5 cursor-wait' : 'border-zinc-800 hover:border-zinc-600'}`}>
                                <input type="file" multiple className="hidden" onChange={handleFileUpload} disabled={loading} accept="image/*" />
                                {loading ? (
                                    <div className="mono text-yellow-500 animate-pulse">PRTS DATA ANALYZING...</div>
                                ) : (
                                    <div>
                                        <p className="text-lg font-medium mb-2 uppercase tracking-widest text-zinc-300">上傳歷史記錄截圖</p>
                                        <p className="text-xs text-zinc-500 mono">SUPPORT: MULTI-IMAGE / AUTO-DEDUPLICATION</p>
                                    </div>
                                )}
                            </label>
                        </div>

                        {/* Pools Section */}
                        <div className="grid grid-cols-1 gap-8">
                            {stats.pools.slice().reverse().map(pool => (
                                <div key={pool.name} className="glass-card rounded-sm overflow-hidden border-t border-zinc-700/50">
                                    <div className="bg-zinc-900/50 p-4 flex justify-between items-center border-b border-zinc-800">
                                        <div className="cursor-pointer" onClick={() => setEditingPool(pool.name)}>
                                            <h2 className="text-lg font-bold flex items-center gap-2">
                                                {pool.name}
                                                <span className="text-[10px] bg-zinc-800 text-zinc-400 px-2 py-0.5 rounded uppercase">Total: {pool.total}</span>
                                            </h2>
                                            <p className="text-[10px] text-zinc-500 mt-1 uppercase mono">Target: {pool.pu || "Not Set (Click to Edit)"}</p>
                                        </div>
                                    </div>
                                    
                                    <div className="p-0">
                                        <table className="w-full text-left text-sm">
                                            <thead className="bg-black/40 text-[10px] text-zinc-600 mono uppercase border-b border-zinc-800">
                                                <tr>
                                                    <th className="px-6 py-3 font-medium">Operator Name</th>
                                                    <th className="px-6 py-3 font-medium text-right">Pity Cost</th>
                                                    <th className="px-6 py-3 font-medium text-right">Acquisition Date</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-zinc-800/50">
                                                {pool.sixPulls.map((p, idx) => (
                                                    <tr key={idx} className="hover:bg-white/5 transition-colors">
                                                        <td className="px-6 py-4">
                                                            <div className="flex items-center gap-2">
                                                                <span className={p.isPU ? 'six-star-active' : 'text-zinc-400'}>{p.operator}</span>
                                                                {p.isPU && <span className="text-[8px] bg-orange-500/20 text-orange-500 px-1 rounded">TARGET</span>}
                                                            </div>
                                                        </td>
                                                        <td className={`px-6 py-4 text-right mono font-bold ${p.pity > 50 ? 'text-red-500' : 'text-green-500'}`}>
                                                            {p.pity}
                                                        </td>
                                                        <td className="px-6 py-4 text-right text-xs text-zinc-600 mono">
                                                            {p.time}
                                                        </td>
                                                    </tr>
                                                ))}
                                                {pool.sixPulls.length === 0 && (
                                                    <tr>
                                                        <td colSpan="3" className="px-6 py-10 text-center text-zinc-700 mono text-xs">NO 6-STAR RECORDS FOUND IN THIS POOL.</td>
                                                    </tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* Modals */}
                    {showApiModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/90">
                            <div className="glass-card w-full max-w-md p-8 rounded-sm">
                                <h3 className="text-xl font-bold mb-4 uppercase tracking-tighter">PRTS API Config</h3>
                                <p className="text-xs text-zinc-500 mb-6 leading-relaxed">請輸入 Gemini API Key 以啟用 AI 文字辨識。密鑰僅存儲於本地緩存。</p>
                                <input 
                                    type="password" 
                                    className="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-sm text-sm focus:border-yellow-500 outline-none mono mb-6"
                                    value={apiKey}
                                    onChange={(e) => {
                                        setApiKey(e.target.value);
                                        localStorage.setItem('ak_gemini_key', e.target.value);
                                    }}
                                    placeholder="Enter your API Key here..."
                                />
                                <button onClick={() => setShowApiModal(false)} className="w-full py-4 bg-yellow-500 text-black font-bold ak-btn text-sm uppercase">Confirm System Sync</button>
                            </div>
                        </div>
                    )}

                    {editingPool && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/90">
                            <div className="glass-card w-full max-w-md p-8 rounded-sm">
                                <h3 className="text-xl font-bold mb-1 uppercase">Set PU Target</h3>
                                <p className="text-[10px] text-zinc-500 mb-6 mono">POOL: {editingPool}</p>
                                <input 
                                    type="text" 
                                    className="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-sm text-sm focus:border-yellow-500 outline-none mb-6"
                                    value={poolSettings[editingPool]?.puChar || ''}
                                    onChange={(e) => setPoolSettings({
                                        ...poolSettings,
                                        [editingPool]: { ...poolSettings[editingPool], puChar: e.target.value }
                                    })}
                                    placeholder="輸入角色全名 (例: 維什戴爾)"
                                />
                                <div className="flex gap-4">
                                    <button onClick={() => {
                                        const newLogs = logs.filter(l => l.pool !== editingPool);
                                        setLogs(newLogs);
                                        setEditingPool(null);
                                    }} className="flex-1 py-4 text-xs text-red-500 border border-red-500/20 hover:bg-red-500/10 transition">DELETE POOL</button>
                                    <button onClick={() => setEditingPool(null)} className="flex-1 py-4 bg-white text-black font-bold ak-btn text-sm uppercase">Update</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
