<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRTS | 抽卡數據分析終端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --ak-bg: #121212;
            --ak-cyan: #00f0ff;
            --ak-yellow: #ffcf00;
            --ak-red: #ff4d4d;
            --ak-text: #e0e0e0;
            --ak-grid: rgba(0, 240, 255, 0.05);
        }

        body {
            background-color: var(--ak-bg);
            background-image: 
                linear-gradient(var(--ak-grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--ak-grid) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--ak-text);
            font-family: 'Noto Sans TC', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 明日方舟風格斜切按鈕 */
        .ak-btn {
            position: relative;
            background: #2b2b2b;
            color: #fff;
            padding: 8px 20px;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            transition: all 0.2s;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .ak-btn:hover {
            background: var(--ak-cyan);
            color: #000;
        }

        .ak-btn.primary {
            background: var(--ak-cyan);
            color: #000;
        }

        .ak-border-box {
            border-left: 4px solid var(--ak-cyan);
            background: rgba(40, 40, 40, 0.8);
            backdrop-filter: blur(4px);
        }

        /* 呼吸燈效果 */
        @keyframes breathing {
            0%, 100% { box-shadow: 0 0 5px var(--ak-yellow); border-color: var(--ak-yellow); }
            50% { box-shadow: 0 0 20px var(--ak-yellow); border-color: #fff; }
        }

        .pu-star-6 {
            animation: breathing 2s infinite ease-in-out;
            border: 2px solid var(--ak-yellow);
            color: var(--ak-yellow) !important;
            font-weight: 900;
        }

        .star-6 { color: var(--ak-yellow); }
        .star-5 { color: #f9a8d4; } /* 接近遊戲內資深幹員顏色 */

        .terminal-header {
            border-bottom: 2px solid #333;
            background: rgba(0,0,0,0.5);
        }

        input, select {
            background: #1a1a1a;
            border: 1px solid #444;
            color: white;
            padding: 4px 8px;
        }

        input:focus {
            outline: none;
            border-color: var(--ak-cyan);
        }

        .modal-overlay {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
        }

        /* 隱藏滾動條 */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--ak-cyan); }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- 頂部標題與 API 設定 -->
    <header class="terminal-header mb-8 pb-4 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div>
            <h1 class="text-3xl font-black italic tracking-tighter">PRTS <span class="text-sm not-italic font-normal opacity-50">LOGISTICS TERMINAL</span></h1>
            <p class="text-xs text-cyan-400">STATUS: ONLINE | DATA ARCHIVE v2.5</p>
        </div>
        <div class="flex gap-2 flex-wrap">
            <input type="password" id="apiKey" placeholder="輸入 Gemini API Key" class="text-sm w-48">
            <button onclick="exportData()" class="ak-btn text-xs"><i class="fas fa-download"></i> 導出數據</button>
            <label class="ak-btn text-xs cursor-pointer">
                <i class="fas fa-upload"></i> 導入數據
                <input type="file" id="importFile" class="hidden" onchange="importData(event)">
            </label>
        </div>
    </header>

    <!-- 全局統計區塊 -->
    <section id="globalStats" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
        <div class="ak-border-box p-4">
            <h3 class="text-xs opacity-50 mb-1">平均出貨抽數 (PU 六星)</h3>
            <div id="avgPuPulls" class="text-4xl font-bold text-cyan-400">--</div>
        </div>
        <div class="ak-border-box p-4 border-l-red-500">
            <h3 class="text-xs opacity-50 mb-1">非預期六星機率 (歪率)</h3>
            <div id="offBannerRate" class="text-4xl font-bold text-red-400">--%</div>
        </div>
    </section>

    <!-- 操作區 -->
    <section class="mb-10">
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-xl font-bold flex items-center gap-2">
                <i class="fas fa-history text-cyan-400"></i> 紀錄辨識與上傳
            </h2>
        </div>
        <div class="border-2 border-dashed border-gray-600 rounded-lg p-10 text-center hover:border-cyan-400 transition-colors">
            <input type="file" id="imageUpload" multiple accept="image/*" class="hidden" onchange="handleUpload(event)">
            <label for="imageUpload" class="cursor-pointer">
                <i class="fas fa-cloud-upload-alt text-4xl mb-4 text-gray-500"></i>
                <p>點擊或拖放數張抽卡截圖至此處</p>
                <p class="text-xs opacity-40 mt-2">支援多選，AI 將自動辨識卡池與幹員</p>
            </label>
        </div>
        <div id="processingStatus" class="mt-4 text-cyan-500 text-sm hidden">
            <i class="fas fa-spinner fa-spin"></i> PRTS 正在解析圖像數據...
        </div>
    </section>

    <!-- 卡池列表區 -->
    <main id="poolContainer" class="space-y-8">
        <!-- 卡池區塊範例 -->
    </main>

    <!-- 設定 PU 模組 -->
    <div id="puModal" class="modal-overlay fixed inset-0 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-zinc-900 p-6 w-full max-w-md border border-cyan-800 shadow-2xl">
            <h3 class="text-xl font-bold mb-4 text-cyan-400">設定卡池 PU 幹員</h3>
            <p class="text-xs mb-4 opacity-70">請輸入該卡池主要針對的六星角色名稱，系統將據此計算出貨消耗。</p>
            <input type="text" id="puInput" class="w-full mb-6 p-2 bg-black border border-gray-700" placeholder="例如: 瑪恩納">
            <div class="flex justify-end gap-3">
                <button onclick="closeModal()" class="text-sm opacity-50">取消</button>
                <button onclick="savePU()" class="ak-btn primary">確定</button>
            </div>
        </div>
    </div>

    <script>
        let db = {
            pools: {}, // poolName: { puName: string, records: [{name, star, time}] }
        };

        const API_KEY_STORE = 'ak_tracker_api_key';
        const DB_STORE = 'ak_tracker_db';

        // 初始化
        window.onload = () => {
            const savedKey = localStorage.getItem(API_KEY_STORE);
            if (savedKey) document.getElementById('apiKey').value = savedKey;

            const savedDb = localStorage.getItem(DB_STORE);
            if (savedDb) {
                db = JSON.parse(savedDb);
                renderAll();
            }
        };

        // --- 核心邏輯 ---

        async function handleUpload(event) {
            const files = Array.from(event.target.files);
            const apiKey = document.getElementById('apiKey').value;
            
            if (!apiKey) {
                alert("請先輸入 Gemini API Key 才能進行辨識");
                return;
            }
            localStorage.setItem(API_KEY_STORE, apiKey);

            document.getElementById('processingStatus').classList.remove('hidden');

            for (const file of files) {
                try {
                    const base64 = await fileToBase64(file);
                    const result = await recognizeImage(base64, apiKey);
                    processResult(result);
                } catch (e) {
                    console.error("辨識失敗", e);
                }
            }

            document.getElementById('processingStatus').classList.add('hidden');
            saveAndRender();
        }

        async function recognizeImage(base64Data, apiKey) {
            const prompt = `
                你是一位明日方舟資料錄入員。請辨識這張抽卡紀錄截圖。
                輸出格式必須是純 JSON，包含以下欄位：
                "poolName": 卡池名稱 (字串)
                "operators": 陣列，每個元素為 {"name": 幹員名稱, "star": 星級數字, "time": 獲得時間字串 YYYY-MM-DD HH:mm:ss}
                注意：畫面中若有標示 6★ 即為 6 星。
            `;

            // 使用 Gemini 2.5 Flash
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: prompt },
                            { inlineData: { mimeType: "image/png", data: base64Data.split(',')[1] } }
                        ]
                    }],
                    generationConfig: { responseMimeType: "application/json" }
                })
            });

            const data = await response.json();
            const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
            return JSON.parse(text);
        }

        function processResult(data) {
            if (!data.poolName) return;

            if (!db.pools[data.poolName]) {
                db.pools[data.poolName] = { puName: "", records: [] };
            }

            // 合併並去重 (根據時間和名稱)
            data.operators.forEach(op => {
                const exists = db.pools[data.poolName].records.find(r => r.time === op.time && r.name === op.name);
                if (!exists) {
                    db.pools[data.poolName].records.push(op);
                }
            });

            // 按時間排序
            db.pools[data.poolName].records.sort((a, b) => new Date(a.time) - new Date(b.time));
        }

        // --- UI 渲染 ---

        function saveAndRender() {
            localStorage.setItem(DB_STORE, JSON.stringify(db));
            renderAll();
        }

        function renderAll() {
            renderStats();
            renderPools();
        }

        function renderStats() {
            let totalPuPulls = 0;
            let puCount = 0;
            let total6Stars = 0;
            let totalOffBanner = 0;

            Object.values(db.pools).forEach(pool => {
                if (!pool.puName) return;

                let pullCounter = 0;
                let foundPu = false;

                pool.records.forEach(op => {
                    pullCounter++;
                    if (op.star === 6) {
                        total6Stars++;
                        if (op.name === pool.puName) {
                            totalPuPulls += pullCounter;
                            puCount++;
                            pullCounter = 0; // 算出一個後重置計算下一個
                            foundPu = true;
                        } else {
                            totalOffBanner++;
                        }
                    }
                });
            });

            document.getElementById('avgPuPulls').innerText = puCount > 0 ? (totalPuPulls / puCount).toFixed(1) : "--";
            document.getElementById('offBannerRate').innerText = total6Stars > 0 ? ((totalOffBanner / total6Stars) * 100).toFixed(1) + "%" : "--%";
        }

        function renderPools() {
            const container = document.getElementById('poolContainer');
            container.innerHTML = '';

            Object.keys(db.pools).forEach(poolName => {
                const pool = db.pools[poolName];
                const poolDiv = document.createElement('div');
                poolDiv.className = 'ak-border-box overflow-hidden';

                // 計算針對 PU 的出貨歷史
                let pullSummaries = [];
                if (pool.puName) {
                    let currentCount = 0;
                    pool.records.forEach(op => {
                        currentCount++;
                        if (op.star === 6) {
                            pullSummaries.push({
                                name: op.name,
                                pulls: currentCount,
                                isPu: op.name === pool.puName
                            });
                            currentCount = 0;
                        }
                    });
                }

                poolDiv.innerHTML = `
                    <div class="p-4 bg-zinc-800 flex justify-between items-center border-b border-zinc-700">
                        <div>
                            <button onclick="openPuModal('${poolName}')" class="text-xl font-bold hover:text-cyan-400 text-left">
                                ${poolName} <i class="fas fa-edit text-xs opacity-30"></i>
                            </button>
                            <div class="text-xs opacity-50 mt-1">總計 ${pool.records.length} 抽</div>
                        </div>
                        <button onclick="deletePool('${poolName}')" class="text-zinc-600 hover:text-red-500"><i class="fas fa-trash"></i></button>
                    </div>
                    <div class="p-4 bg-black/40">
                        ${pool.puName ? `
                            <div class="mb-4 flex flex-wrap gap-2">
                                <span class="text-xs bg-cyan-900/50 text-cyan-200 px-2 py-1">目標: ${pool.puName}</span>
                                ${pullSummaries.map(s => `
                                    <span class="text-xs px-2 py-1 ${s.isPu ? 'pu-star-6' : 'bg-red-900/30 text-red-300'}">
                                        ${s.name} [${s.pulls}抽]
                                    </span>
                                `).join('')}
                            </div>
                        ` : `<div class="text-xs opacity-30 mb-4 italic">點擊卡池名稱設定 PU 角色以分析出貨率</div>`}
                        
                        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 lg:grid-cols-8 gap-2">
                            ${pool.records.map(op => `
                                <div class="p-2 bg-zinc-800/50 border border-zinc-700 text-center ${op.name === pool.puName ? 'pu-star-6' : ''}">
                                    <div class="text-[10px] opacity-40 leading-none mb-1">${op.time.split(' ')[0]}</div>
                                    <div class="font-bold text-sm truncate">${op.name}</div>
                                    <div class="text-[10px] ${op.star === 6 ? 'star-6' : op.star === 5 ? 'star-5' : 'opacity-40'}">
                                        ${'★'.repeat(op.star)}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                container.appendChild(poolDiv);
            });
        }

        // --- 彈窗控制 ---
        let currentEditingPool = "";

        function openPuModal(poolName) {
            currentEditingPool = poolName;
            document.getElementById('puInput').value = db.pools[poolName].puName;
            document.getElementById('puModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('puModal').classList.add('hidden');
        }

        function savePU() {
            const val = document.getElementById('puInput').value;
            db.pools[currentEditingPool].puName = val;
            closeModal();
            saveAndRender();
        }

        function deletePool(name) {
            if (confirm(`確定要刪除卡池「${name}」的所有紀錄嗎？`)) {
                delete db.pools[name];
                saveAndRender();
            }
        }

        // --- 工具函數 ---

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(db, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `arknights_pulls_${new Date().getTime()}.json`;
            a.click();
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    db = JSON.parse(e.target.result);
                    saveAndRender();
                } catch (err) {
                    alert("導入失敗：無效的檔案格式");
                }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
