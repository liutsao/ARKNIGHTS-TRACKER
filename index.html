<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRTS | 抽卡數據分析終端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --ak-bg: #121212;
            --ak-cyan: #00f0ff;
            --ak-yellow: #ffcf00;
            --ak-red: #ff4d4d;
            --ak-text: #e0e0e0;
            --ak-grid: rgba(0, 240, 255, 0.05);
        }

        body {
            background-color: var(--ak-bg);
            background-image: 
                linear-gradient(var(--ak-grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--ak-grid) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--ak-text);
            font-family: 'Noto Sans TC', sans-serif;
            min-height: 100vh;
        }

        .ak-btn {
            position: relative;
            background: #2b2b2b;
            color: #fff;
            padding: 8px 20px;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            transition: all 0.2s;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
        }

        .ak-btn:hover { background: var(--ak-cyan); color: #000; }
        .ak-btn.primary { background: var(--ak-cyan); color: #000; }

        .ak-border-box {
            border-left: 4px solid var(--ak-cyan);
            background: rgba(30, 30, 30, 0.9);
            backdrop-filter: blur(10px);
        }

        @keyframes breathing {
            0%, 100% { box-shadow: 0 0 5px var(--ak-yellow); border-color: var(--ak-yellow); }
            50% { box-shadow: 0 0 20px var(--ak-yellow); border-color: #fff; }
        }

        .pu-star-6 {
            animation: breathing 2s infinite ease-in-out;
            border: 2px solid var(--ak-yellow) !important;
            color: var(--ak-yellow) !important;
        }

        .star-6 { color: var(--ak-yellow); font-weight: bold; }
        .star-5 { color: #f9a8d4; }

        .modal-overlay {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
        }

        .loading-bar {
            height: 2px;
            background: var(--ak-cyan);
            transition: width 0.3s;
        }
        
        .error-msg {
            color: var(--ak-red);
            font-size: 11px;
            margin-top: 8px;
            background: rgba(255, 77, 77, 0.1);
            padding: 10px;
            border-left: 2px solid var(--ak-red);
            word-break: break-all;
            white-space: pre-wrap;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="mb-8 pb-4 border-b border-zinc-800 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div>
            <h1 class="text-3xl font-black italic tracking-tighter">PRTS <span class="text-sm not-italic font-normal opacity-50">ARCHIVE TERMINAL</span></h1>
            <p class="text-xs text-cyan-400" id="statusText">系統狀態: 待機中</p>
        </div>
        <div class="flex gap-2 flex-wrap">
            <input type="password" id="apiKey" placeholder="輸入 Gemini API Key" class="text-sm bg-zinc-900 border border-zinc-700 px-3 py-2 outline-none focus:border-cyan-500 text-white w-64">
            <button onclick="exportData()" class="ak-btn text-xs"><i class="fas fa-file-export"></i> 導出</button>
            <button onclick="clearAllData()" class="ak-btn text-xs bg-red-900/20 text-red-400 hover:bg-red-500 hover:text-white"><i class="fas fa-trash"></i> 清空</button>
        </div>
    </header>

    <section id="globalStats" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
        <div class="ak-border-box p-4">
            <h3 class="text-xs opacity-50 mb-1 uppercase tracking-widest">平均出貨抽數 (PU 六星)</h3>
            <div id="avgPuPulls" class="text-4xl font-bold text-cyan-400">--</div>
        </div>
        <div class="ak-border-box p-4 border-l-red-500">
            <h3 class="text-xs opacity-50 mb-1 uppercase tracking-widest">非預期六星機率 (歪率)</h3>
            <div id="offBannerRate" class="text-4xl font-bold text-red-400">--%</div>
        </div>
    </section>

    <section class="mb-10">
        <div class="border-2 border-dashed border-zinc-700 rounded p-8 text-center hover:border-cyan-500 transition-all bg-zinc-900/30">
            <input type="file" id="imageUpload" multiple accept="image/*" class="hidden" onchange="handleUpload(event)">
            <label for="imageUpload" class="cursor-pointer group">
                <i class="fas fa-camera text-4xl mb-4 text-zinc-600 group-hover:text-cyan-500 transition-colors"></i>
                <p class="text-zinc-400">點擊上傳或拖放抽卡紀錄截圖</p>
                <p class="text-[10px] opacity-40 mt-2 italic">提示：若報錯請嘗試重新產生 API Key</p>
            </label>
        </div>
        <div id="progressBarContainer" class="mt-4 hidden">
            <div class="w-full bg-zinc-800 h-0.5 mb-1">
                <div id="progressBar" class="loading-bar" style="width: 0%"></div>
            </div>
            <p id="progressLabel" class="text-[10px] text-cyan-500 uppercase">正在解析...</p>
            <div id="apiErrorLog" class="error-msg hidden"></div>
        </div>
    </section>

    <main id="poolContainer" class="space-y-6"></main>

    <div id="puModal" class="modal-overlay fixed inset-0 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-zinc-900 p-6 w-full max-w-sm border border-cyan-900">
            <h3 class="text-lg font-bold mb-2 text-cyan-400 italic">SET UP RATE-UP UNIT</h3>
            <p class="text-[10px] mb-4 opacity-50">請輸入該卡池的目標六星幹員名稱。</p>
            <input type="text" id="puInput" class="w-full mb-6 p-2 bg-black border border-zinc-700 focus:border-cyan-500 outline-none text-white">
            <div class="flex justify-end gap-3">
                <button onclick="closeModal()" class="text-xs opacity-50 uppercase">Cancel</button>
                <button onclick="savePU()" class="ak-btn primary text-xs">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        let db = { pools: {} };
        const DB_KEY = 'arknights_tracker_v5';

        window.onload = () => {
            const savedKey = localStorage.getItem('arknights_gemini_key');
            if (savedKey) document.getElementById('apiKey').value = savedKey;
            const savedDb = localStorage.getItem(DB_KEY);
            if (savedDb) { try { db = JSON.parse(savedDb); renderAll(); } catch(e) {} }
        };

        async function handleUpload(event) {
            const files = Array.from(event.target.files);
            const apiKey = document.getElementById('apiKey').value.trim();
            if (!apiKey) return alert("請輸入 API Key");
            localStorage.setItem('arknights_gemini_key', apiKey);

            const container = document.getElementById('progressBarContainer');
            const bar = document.getElementById('progressBar');
            const label = document.getElementById('progressLabel');
            const errorLog = document.getElementById('apiErrorLog');

            container.classList.remove('hidden');
            errorLog.classList.add('hidden');

            for (let i = 0; i < files.length; i++) {
                bar.style.width = `${((i / files.length) * 100)}%`;
                label.innerText = `處理中: ${files[i].name}`;

                try {
                    const base64 = await fileToBase64(files[i]);
                    // 改用最保守的 v1 調用方式
                    const result = await callGeminiStable(base64, apiKey);
                    if (result) {
                        processData(result);
                        saveAndRender();
                    }
                } catch (e) {
                    errorLog.innerText = `終端報錯: ${e.message}\n\n可能原因：\n1. API Key 不支援 1.5 系列模型\n2. 您所在的地區限制\n3. 建議前往 AI Studio 重新生成一個 API Key。`;
                    errorLog.classList.remove('hidden');
                    break;
                }
            }
            bar.style.width = '100%';
            label.innerText = "同步完成";
            setTimeout(() => container.classList.add('hidden'), 3000);
        }

        async function callGeminiStable(base64, apiKey) {
            // 使用 v1 穩定版與標準模型路徑
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: [{
                    parts: [
                        { text: "辨識圖中明日方舟抽卡紀錄。輸出為單一 JSON 對象，包含 poolName (字串) 和 operators (數組，含 name, star, time)。格式範例：{\"poolName\":\"池名\",\"operators\":[{\"name\":\"凱爾希\",\"star\":6,\"time\":\"2024-01-01 12:00:00\"}]}" },
                        { inlineData: { mimeType: "image/png", data: base64.split(',')[1] } }
                    ]
                }]
            };

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            if (!response.ok) {
                throw new Error(data.error?.message || `HTTP ${response.status}`);
            }

            const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text;
            if (!rawText) throw new Error("API 無回傳內容");

            // 手動過濾 Markdown 標籤以解析 JSON
            const jsonStr = rawText.replace(/```json/g, "").replace(/```/g, "").trim();
            return JSON.parse(jsonStr);
        }

        function processData(data) {
            const name = data.poolName || "未知卡池";
            if (!db.pools[name]) db.pools[name] = { puName: "", records: [] };
            data.operators.forEach(op => {
                const exists = db.pools[name].records.some(r => r.time === op.time && r.name === op.name);
                if (!exists) db.pools[name].records.push(op);
            });
            db.pools[name].records.sort((a, b) => new Date(a.time) - new Date(b.time));
        }

        function saveAndRender() {
            localStorage.setItem(DB_KEY, JSON.stringify(db));
            renderAll();
        }

        function renderAll() {
            renderStats();
            renderPools();
        }

        function renderStats() {
            let totalPuPulls = 0, puCount = 0, total6Stars = 0, totalOffBanner = 0;
            Object.values(db.pools).forEach(pool => {
                if (!pool.puName) return;
                let pullCounter = 0;
                pool.records.forEach(op => {
                    pullCounter++;
                    if (op.star === 6) {
                        total6Stars++;
                        if (op.name === pool.puName) {
                            totalPuPulls += pullCounter;
                            puCount++;
                            pullCounter = 0;
                        } else { totalOffBanner++; }
                    }
                });
            });
            document.getElementById('avgPuPulls').innerText = puCount > 0 ? (totalPuPulls / puCount).toFixed(1) : "--";
            document.getElementById('offBannerRate').innerText = total6Stars > 0 ? ((totalOffBanner / total6Stars) * 100).toFixed(1) + "%" : "--%";
        }

        function renderPools() {
            const container = document.getElementById('poolContainer');
            container.innerHTML = '';
            Object.keys(db.pools).sort().reverse().forEach(name => {
                const pool = db.pools[name];
                const div = document.createElement('div');
                div.className = 'ak-border-box overflow-hidden mb-6';
                let pulls6 = [], c = 0;
                pool.records.forEach(r => {
                    c++;
                    if(r.star === 6) { pulls6.push({ n: r.name, p: c, is: r.name === pool.puName }); c = 0; }
                });
                div.innerHTML = `
                    <div class="p-4 bg-zinc-800/80 flex justify-between items-center border-b border-zinc-700">
                        <div class="cursor-pointer group" onclick="openPuModal('${name.replace(/'/g, "\\'")}')">
                            <h2 class="text-lg font-bold text-white group-hover:text-cyan-400">${name}</h2>
                            <span class="text-[10px] text-cyan-500 bg-cyan-950 px-2 font-mono">COUNT: ${pool.records.length}</span>
                        </div>
                        <button onclick="deletePool('${name.replace(/'/g, "\\'")}')" class="text-zinc-500 hover:text-red-500"><i class="fas fa-times"></i></button>
                    </div>
                    <div class="p-4">
                        <div class="mb-4 flex flex-wrap gap-2">
                            ${pool.puName ? `<span class="text-[10px] bg-white text-black px-2 font-bold">PU: ${pool.puName}</span>` : ''}
                            ${pulls6.map(s => `<span class="text-[10px] px-2 py-1 border border-zinc-700 ${s.is ? 'pu-star-6 font-bold' : 'text-zinc-400'}">${s.n} [${s.p}]</span>`).join('')}
                        </div>
                        <div class="grid grid-cols-3 sm:grid-cols-5 md:grid-cols-8 lg:grid-cols-10 gap-2">
                            ${pool.records.map(r => `
                                <div class="p-2 bg-zinc-900 border border-zinc-800 text-center ${r.name === pool.puName ? 'pu-star-6' : ''}">
                                    <div class="text-[10px] font-bold truncate">${r.name}</div>
                                    <div class="text-[9px] ${r.star === 6 ? 'star-6' : r.star === 5 ? 'star-5' : 'opacity-30'}">${'★'.repeat(r.star)}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        let currentEditingPool = "";
        function openPuModal(name) { currentEditingPool = name; document.getElementById('puInput').value = db.pools[name].puName; document.getElementById('puModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('puModal').classList.add('hidden'); }
        function savePU() { db.pools[currentEditingPool].puName = document.getElementById('puInput').value.trim(); closeModal(); saveAndRender(); }
        function deletePool(name) { if(confirm("確定刪除？")) { delete db.pools[name]; saveAndRender(); } }
        function clearAllData() { if(confirm("確定清空？")) { db = { pools: {} }; saveAndRender(); } }
        function fileToBase64(file) { return new Promise(r => { const reader = new FileReader(); reader.onload = () => r(reader.result); reader.readAsDataURL(file); }); }
        function exportData() {
            const blob = new Blob([JSON.stringify(db)], {type:'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `arknights_data.json`;
            a.click();
        }
    </script>
</body>
</html>
