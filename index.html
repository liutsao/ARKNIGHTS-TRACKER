<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>明日方舟抽卡紀錄統計器</title>
    <!-- 引入 React, Babel (解析 JSX) 與 Tailwind CSS -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide 圖標 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #09090b; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- 配置區 ---
        const APP_TITLE = "明日方舟抽卡紀錄統計器"; 
        const PRIMARY_COLOR = "cyan-400"; // 您可以在這裡修改顏色代碼
        
        const MODEL_NAME = "gemini-2.5-flash-preview-09-2025";
        const STORAGE_KEY = "ark_tracker_data_v1";
        const CONFIG_KEY = "ark_tracker_config";

        const App = () => {
            const [records, setRecords] = useState([]);
            const [puSettings, setPuSettings] = useState({});
            const [userApiKey, setUserApiKey] = useState("");
            const [isProcessing, setIsProcessing] = useState(false);
            const [statusMessage, setStatusMessage] = useState("");
            const [showSettings, setShowSettings] = useState(false);
            
            const fileInputRef = useRef(null);
            const importInputRef = useRef(null);

            useEffect(() => {
                const savedData = localStorage.getItem(STORAGE_KEY);
                const savedConfig = localStorage.getItem(CONFIG_KEY);
                if (savedData) {
                    const { savedRecords, savedPuSettings } = JSON.parse(savedData);
                    setRecords(savedRecords || []);
                    setPuSettings(savedPuSettings || {});
                }
                if (savedConfig) {
                    const { apiKey } = JSON.parse(savedConfig);
                    setUserApiKey(apiKey || "");
                }
                lucide.createIcons();
            }, []);

            useEffect(() => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ savedRecords: records, savedPuSettings: puSettings }));
                lucide.createIcons();
            }, [records, puSettings, showSettings]);

            const saveApiKey = (key) => {
                setUserApiKey(key);
                localStorage.setItem(CONFIG_KEY, JSON.stringify({ apiKey: key }));
                setShowSettings(false);
            };

            const exportData = () => {
                const dataStr = JSON.stringify({ records, puSettings }, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `ark_data.json`;
                a.click();
            };

            const importData = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const json = JSON.parse(event.target.result);
                        if (json.records) setRecords(json.records);
                        if (json.puSettings) setPuSettings(json.puSettings);
                        alert("導入成功");
                    } catch (err) { alert("無效檔案"); }
                };
                reader.readAsText(file);
            };

            const processImages = async (imageFiles) => {
                if (!userApiKey) { setShowSettings(true); return; }
                setIsProcessing(true);
                setStatusMessage("正在分析截圖...");
                const newRecords = [];
                for (const file of imageFiles) {
                    try {
                        const base64 = await new Promise(r => {
                            const reader = new FileReader();
                            reader.readAsDataURL(file);
                            reader.onload = () => r(reader.result.split(',')[1]);
                        });

                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${userApiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{
                                    parts: [
                                        { text: "請辨識《明日方舟》抽卡紀錄截圖，輸出JSON陣列：[{pool, name, star, time(yyyy-mm-dd hh:mm:ss)}]" },
                                        { inlineData: { mimeType: "image/png", data: base64 } }
                                    ]
                                }]
                            })
                        });
                        const data = await response.json();
                        const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "[]";
                        const json = JSON.parse(text.replace(/```json|```/g, ""));
                        newRecords.push(...json);
                    } catch (err) { console.error(err); setStatusMessage("辨識出錯"); }
                }
                setRecords(prev => {
                    const combined = [...prev, ...newRecords];
                    const unique = combined.reduce((acc, curr) => {
                        if (!acc.find(x => x.time === curr.time && x.name === curr.name)) acc.push(curr);
                        return acc;
                    }, []);
                    return unique.sort((a, b) => new Date(a.time) - new Date(b.time));
                });
                setIsProcessing(false);
            };

            const poolGroups = useMemo(() => {
                const groups = {};
                records.forEach(r => {
                    if (!groups[r.pool]) groups[r.pool] = { name: r.pool, items: [], total: 0 };
                    groups[r.pool].items.push(r);
                    groups[r.pool].total++;
                });
                return Object.values(groups);
            }, [records]);

            const stats = useMemo(() => {
                let totalPulls = 0, puCount = 0, sixStars = 0, offBanner = 0;
                poolGroups.forEach(g => {
                    const target = puSettings[g.name];
                    g.items.forEach((item, idx) => {
                        if (item.star === 6) {
                            sixStars++;
                            if (target && item.name.includes(target)) {
                                totalPulls += (idx + 1);
                                puCount++;
                            } else if (target) offBanner++;
                        }
                    });
                });
                return {
                    avg: puCount > 0 ? (totalPulls / puCount).toFixed(1) : "-",
                    rate: sixStars > 0 ? ((offBanner / sixStars) * 100).toFixed(1) : "0"
                };
            }, [poolGroups, puSettings]);

            return (
                <div className="min-h-screen text-zinc-100 font-sans p-4">
                    <div className="max-w-4xl mx-auto">
                        <header className="flex justify-between items-center mb-8">
                            <h1 className="text-xl font-bold flex items-center gap-2">
                                <i data-lucide="bar-chart-3" className={`text-${PRIMARY_COLOR}`}></i> {APP_TITLE}
                            </h1>
                            <button onClick={() => setShowSettings(true)} className="p-2 hover:bg-zinc-800 rounded-full">
                                <i data-lucide="settings" className={!userApiKey ? "text-red-500 animate-pulse" : "text-zinc-400"}></i>
                            </button>
                        </header>

                        <div className="grid grid-cols-2 gap-4 mb-8">
                            <div className="bg-zinc-900 p-6 rounded-2xl border border-zinc-800">
                                <p className="text-zinc-500 text-xs uppercase font-bold mb-1">平均出貨抽數</p>
                                <p className={`text-3xl font-black text-${PRIMARY_COLOR}`}>{stats.avg} <span className="text-sm font-normal text-zinc-600">抽</span></p>
                            </div>
                            <div className="bg-zinc-900 p-6 rounded-2xl border border-zinc-800">
                                <p className="text-zinc-500 text-xs uppercase font-bold mb-1">六星歪率</p>
                                <p className="text-3xl font-black text-red-500">{stats.rate}%</p>
                            </div>
                        </div>

                        <div 
                            className="border-2 border-dashed border-zinc-800 rounded-3xl p-10 text-center mb-8 cursor-pointer hover:bg-zinc-900/50"
                            onClick={() => !isProcessing && fileInputRef.current?.click()}
                        >
                            <input type="file" multiple hidden ref={fileInputRef} accept="image/*" onChange={(e) => processImages(Array.from(e.target.files))} />
                            {isProcessing ? <i data-lucide="loader-2" className={`animate-spin mx-auto text-${PRIMARY_COLOR} mb-2`}></i> : <i data-lucide="upload" className="mx-auto text-zinc-600 mb-2"></i>}
                            <p className="font-bold">{isProcessing ? statusMessage : "點擊上傳截圖"}</p>
                        </div>

                        <div className="space-y-4">
                            {poolGroups.map(group => (
                                <div key={group.name} className="bg-zinc-900 rounded-2xl border border-zinc-800 overflow-hidden">
                                    <div className="p-4 border-b border-zinc-800 flex justify-between items-center bg-zinc-800/30">
                                        <span className="font-bold text-sm">{group.name} ({group.total} 抽)</span>
                                        <input 
                                            placeholder="設定 PU 角色"
                                            className="bg-zinc-950 border border-zinc-700 rounded-lg px-3 py-1 text-xs w-32 outline-none"
                                            value={puSettings[group.name] || ""}
                                            onChange={(e) => setPuSettings({...puSettings, [group.name]: e.target.value})}
                                        />
                                    </div>
                                    <div className="p-4 text-xs text-zinc-400 space-y-2">
                                        {group.items.filter(x => x.star === 6).map((x, i) => (
                                            <div key={i} className={x.name.includes(puSettings[group.name]) ? `text-${PRIMARY_COLOR} font-bold` : "text-red-400"}>
                                                • {x.name} <span className="opacity-40 ml-2">({x.time})</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>

                        <div className="mt-8 flex justify-center gap-6 text-[10px] text-zinc-600 font-bold uppercase">
                            <button onClick={exportData} className="flex items-center gap-1 hover:text-zinc-300"><i data-lucide="download" size="14"></i> 導出</button>
                            <button onClick={() => importInputRef.current.click()} className="flex items-center gap-1 hover:text-zinc-300"><i data-lucide="upload-cloud" size="14"></i> 導入</button>
                            <input type="file" hidden ref={importInputRef} onChange={importData} />
                        </div>
                    </div>

                    {showSettings && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
                            <div className="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 w-full max-w-sm">
                                <h2 className="font-bold flex items-center gap-2 mb-4 text-zinc-100">API Key 設定</h2>
                                <input 
                                    type="password"
                                    className="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3 text-sm mb-4 outline-none text-white"
                                    placeholder="貼上 Gemini API Key"
                                    value={userApiKey}
                                    onChange={(e) => setUserApiKey(e.target.value)}
                                />
                                <button onClick={() => saveApiKey(userApiKey)} className={`w-full bg-${PRIMARY_COLOR} text-black font-bold py-3 rounded-xl`}>儲存</button>
                                <button onClick={() => setShowSettings(false)} className="w-full text-zinc-500 text-xs mt-4">關閉</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
